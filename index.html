<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SF Open World — 3D Flight Experience</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{overflow:hidden;background:#000;font-family:'Helvetica Neue',sans-serif;color:#fff}
  canvas{display:block}
  #loading{position:fixed;inset:0;background:#0a0a0a;display:flex;align-items:center;justify-content:center;z-index:100;transition:opacity 1.5s}
  .loading-content{text-align:center}
  .loading-content h1{font-size:2.4rem;font-weight:200;letter-spacing:0.5em;margin-bottom:1rem;color:#c04530}
  .loading-content p{font-size:0.9rem;color:#888;margin-bottom:2rem;letter-spacing:0.2em}
  .progress-bar{width:300px;height:2px;background:#222;border-radius:1px;overflow:hidden;margin:0 auto}
  .progress-fill{width:0%;height:100%;background:linear-gradient(90deg,#c04530,#e8a060);transition:width 0.3s}
  #overlay{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:50;pointer-events:none;transition:opacity 0.8s}
  .overlay-box{background:rgba(0,0,0,0.65);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:1rem 1.5rem;pointer-events:auto;display:flex;align-items:center;gap:1.2rem}
  .fly-btn{background:rgba(192,69,48,0.8);color:#fff;border:none;border-radius:8px;padding:0.6rem 1.4rem;font-size:0.85rem;font-weight:600;letter-spacing:0.15em;cursor:pointer;white-space:nowrap;transition:background 0.2s}
  .fly-btn:hover{background:rgba(192,69,48,1)}
  .help-toggle{color:#888;font-size:0.75rem;cursor:pointer;text-decoration:underline;text-underline-offset:2px}
  .help-toggle:hover{color:#ccc}
  .controls-grid{display:none;grid-template-columns:1fr 1fr;gap:0.3rem 1.5rem;text-align:left;font-size:0.7rem;color:#aaa;margin-top:0.8rem;padding-top:0.8rem;border-top:1px solid rgba(255,255,255,0.08)}
  .controls-grid.show{display:grid}
  .controls-grid span:nth-child(odd){color:#c04530;font-weight:600}
  #hud{position:fixed;bottom:20px;left:20px;z-index:40;font-size:0.75rem;color:rgba(255,255,255,0.6);pointer-events:none;transition:opacity 0.5s}
  #hud div{margin-bottom:4px}
  #hud .val{color:#c04530;font-weight:600;font-size:0.85rem}
  #viewpoint-label{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.4rem;font-weight:200;letter-spacing:0.4em;color:rgba(255,255,255,0.8);pointer-events:none;opacity:0;transition:opacity 0.5s;z-index:40;text-shadow:0 2px 20px rgba(0,0,0,0.5)}
  /* Clock overlay */
  #clock-overlay{position:fixed;top:24px;right:24px;z-index:45;pointer-events:none;text-align:right;padding:12px 16px;border-radius:12px;background:rgba(0,0,0,0.35);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.08)}
  .clock-time{font-size:1.6rem;font-weight:300;letter-spacing:0.15em;color:rgba(255,255,255,0.92);text-shadow:0 1px 4px rgba(0,0,0,0.8);font-variant-numeric:tabular-nums}
  .clock-date{font-size:0.65rem;color:rgba(255,255,255,0.55);letter-spacing:0.12em;margin-top:3px;text-shadow:0 1px 3px rgba(0,0,0,0.6)}
</style>
</head>
<body>
<div id="loading"><div class="loading-content">
  <h1>SAN FRANCISCO</h1>
  <p>Loading 3D Experience</p>
  <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
</div></div>

<div id="overlay"><div class="overlay-box">
  <button class="fly-btn" id="startBtn">FLY (1st Person)</button>
  <span class="help-toggle" id="helpToggle">Controls</span>
  <div class="controls-grid" id="controlsHelp">
    <span>W A S D</span><span>Move</span>
    <span>Mouse</span><span>Look around</span>
    <span>Space / Q</span><span>Up / Down</span>
    <span>Shift</span><span>Boost (3x)</span>
    <span>Scroll</span><span>Adjust speed</span>
    <span>7 / 8 / 9</span><span>Clear / Fog / Rain</span>
    <span>F</span><span>Pause/Play time</span>
    <span>ESC</span><span>Exit 1st person</span>
  </div>
</div></div>

<div id="hud" style="opacity:0">
  <div>Speed: <span class="val" id="hud-speed">50</span> m/s</div>
  <div>Altitude: <span class="val" id="hud-alt">180</span> m</div>
  <div>Position: <span class="val" id="hud-pos">0, 0</span></div>
</div>

<div id="viewpoint-label"></div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
